# Deploy the static app/ directory to GitHub Pages.
#
# The runtime site is entirely static: app/ ships prebuilt data (datasets.json,
# routes.json, land.geojson) that were baked offline and committed, so there is
# nothing to build here — we just publish app/ as-is. (Regenerating the data
# needs the archived engine's gitignored build artifacts, which are not in the
# repo; see pipeline/README.md.)
#
# One-time setup: in the repository, Settings → Pages → Build and deployment →
# Source → "GitHub Actions". Then every push to main redeploys.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['app/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deployment
        uses: actions/deploy-pages@v4
