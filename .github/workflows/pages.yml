# Deploy the static site (repo root) to GitHub Pages.
#
# index.html lives at the repository root along with its modules, styles, and the
# prebuilt data/ (baked offline and committed — nothing is built here). We stage
# only the site files into _site so the published Pages artifact stays lean and
# doesn't expose the archive, pipeline, or source docs.
#
# One-time setup: Settings → Pages → Build and deployment → Source → "GitHub
# Actions". Then every push to main redeploys.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html *.js style.css _site/
          cp -r data _site/
          cp -r research _site/
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
